universe:
  source: sp500_plus_russell1000   # S&P 500 ∪ Russell 1000 (no high-beta additions)
  benchmark: SPY
  liquidity:
    min_adv_usd: 10_000_000        # $10M average daily dollar volume
    min_price: 5.00                # minimum price (excludes penny stocks)

portfolio:
  initial_capital: 10_000.0
  max_concurrent_positions: 5      # focus over diversification
  max_position_value_pct: 0.10     # 10% of portfolio per name (hard cap)
  max_per_sector: 2                # max 2 concurrent positions in same GICS sector

risk:
  risk_per_trade_pct: 0.01         # 1% of portfolio risked per trade ($1,000 on $100k)
  max_stop_atr_mult: 1.5           # skip trade if structural stop > 1.5×ATR away
  portfolio_drawdown_limit: 0.15   # circuit breaker at 15% peak-to-trough drawdown
  drawdown_reset_threshold: 0.07   # resume trading when DD recovers to 7%
  daily_pnl_halt_pct: -0.02        # halt new entries if daily P&L < -2%

execution:
  order_type: limit                # limit at pattern trigger, never market chase
  slippage_bps: 1                  # 0.01% per side (spread cost)
  commission_bps: 0                # Alpaca commission-free
  cancel_after_bars: 2             # cancel limit if unfilled within 2 trigger bars
  partial_fill_prob: 0.50          # backtest assumption for fast breakouts

monitor:
  log_level: INFO
  log_dir: logs/
  report_time: "16:00"             # daily summary at 4:00 PM ET

# ─────────────────────────────────────────────────────────────────
# Technical-analysis stack (replaces the old factor + VWAP blocks)
# ─────────────────────────────────────────────────────────────────
ta:
  timeframes:
    daily_lookback_days: 750       # ~3 years for trend / S/R context
    intraday_history_days: 500     # ~2 years of 1-min bars (resampled to 15m and 1H)

  trend:
    ema_fast: 20
    ema_slow: 50
    sma_long: 200                  # 200-day simple MA — major bias filter
    adx_period: 14
    adx_min: 20.0                  # ADX(14) must clear this for uptrend/downtrend bias
    swing_lookback_bars: 30        # window for swing high/low detection

  support_resistance:
    swing_pivot_window: 5          # bars on each side to qualify as swing pivot
    round_number_levels: [1, 5, 10, 25, 50, 100]   # psychological levels to flag
    cluster_tolerance_pct: 0.005   # merge nearby levels (0.5%)

  candlesticks:
    body_ratio_threshold: 0.3      # for hammer / pin-bar body vs range ratio
    require_at_sr: true            # only score candles that occur at a key S/R level

  breakouts:
    consolidation_atr_contraction: 0.7  # ATR(14)/ATR(50) ≤ 0.7 = compression
    min_volume_multiple: 1.5            # breakout bar volume ≥ 1.5× 20-period avg

  indicators:
    rsi_period: 14
    rsi_oversold: 30                # strict: longs require RSI < 30 (true oversold)
    rsi_overbought: 65              # shorts require RSI > 65
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    bb_period: 20
    bb_std: 2.0
    atr_period: 14
    obv_lookback: 50               # OBV breakout confirmation lookback

  scoring:
    weights:
      sr_level: 25
      candlestick: 20
      trend_alignment: 20
      rsi: 15
      macd: 10
      volume: 10
    threshold: 80                  # composite score required to trigger a setup
    top_n_per_day: 5               # only act on the top-N setups by score
    require_at_sr: true            # hard gate — entry must occur at a key S/R level
    require_candle: true           # hard gate — directional candle must fire
    require_volume: true           # hard gate — volume ≥ 1.5× 20-bar avg required

  anti_churn:
    max_trades_per_ticker_per_day: 2   # hard cap on entries per name per session
    cooldown_bars_after_stop: 20       # 15-min bars; 20 = 5 hours of no re-entry

  exits:
    target1_r: 1.0                 # 1:1 R:R — first profit leg
    target1_pct: 0.40              # take 40% off
    target2_pct: 0.40              # take 40% off at next major S/R
    trail_pct: 0.20                # trail remaining 20%
    trail_atr_mult: 1.0

  hold:
    intraday_hard_close: "15:30"   # ET — close intraday setups if not stopped/targeted
    entry_cutoff_et: "15:30"       # no NEW entries after this ET time (closing-bar filter)
    swing_max_days: 5              # max 5 trading days
    earnings_blackout_days: 5      # skip swing if earnings within N calendar days

  backtest:
    start_date: "2023-01-01"
    end_date: "2024-12-31"
    slippage_bps: 2              # 0.02% per side
    spread_bps: 1                # 0.01% per trade as spread cost


# ─────────────────────────────────────────────────────────────────
# Strategy-evolution agent (tunables only — hard safety limits are
# hard-coded in evolve/guardrails.py and are NOT configurable here)
# ─────────────────────────────────────────────────────────────────
evolve:
  enabled: true
  model: claude-opus-4-8
  cadence: weekly_saturday_0900     # systemd timer; market closed
  shadow_capital: 10000             # virtual book size per shadow candidate
  digest_weeks: 8                   # journal lookback in the evidence digest

momentum_paper:
  capital: 7000

crypto:
  capital: 3000
  universe: [BTC/USD, ETH/USD]
  stable: USDC/USD
  absolute_momentum:
    lookback_days: 84
    skip_days: 14
  relative_momentum:
    lookback_days: 7
    skip_days: 14
  rebalance: weekly_monday_0900
  circuit_breaker:
    max_drawdown_from_peak: -0.40
  order:
    type: limit
    mid_price_tolerance: 0.001
    cancel_after_minutes: 5
    max_attempts: 3
